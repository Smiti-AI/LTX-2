# =============================================================================
# CHASE_PP LoRA — EXP-1 HighCap: rank 32 + FFN, 960×832, 10k steps
# =============================================================================
#
# First CHASE_PP LoRA experiment. Same architecture as SKYE_PP EXP-3-highcap:
#   - Rank 32, Attn + FFN layers
#   - 50% I2V conditioning
#   - 10k steps
#
# Resolution: 960×832 (matches CHASE_PP's ~1.16:1 source aspect ratio,
#   vs 960×544 which would crop off top/bottom of CHASE_PP's head).
#
# Training data: 236 CHASE_PP clips from PAW Patrol (all seasons),
#   preprocessed at 960×832×49 and 960×832×97 buckets.
#   Caption format: "CHASE_PP says [transcript]. [scene_caption]"
#
# Run on H100 (34.56.137.11):
#   cd /home/efrat_t_smiti_ai/projects/LTX-2
#   nohup env PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#     /usr/local/bin/uv run python packages/ltx-trainer/scripts/train.py \
#     packages/ltx-trainer/configs/chase_exp1_highcap.yaml \
#     > /tmp/ltx_current.log 2>&1 &
# =============================================================================

model:
  model_path: "/home/efrat_t_smiti_ai/models/LTX-2.3/ltx-2.3-22b-dev.safetensors"
  text_encoder_path: "/home/efrat_t_smiti_ai/models/gemma-3-12b-it-qat-q4_0-unquantized"
  training_mode: "lora"
  load_checkpoint: null

lora:
  rank: 32
  alpha: 32
  dropout: 0.0
  target_modules:
    # Attention layers
    - "to_k"
    - "to_q"
    - "to_v"
    - "to_out.0"
    # Feed-forward layers — character texture / motion style capacity
    - "ff.net.0.proj"
    - "ff.net.2"
    - "audio_ff.net.0.proj"
    - "audio_ff.net.2"

training_strategy:
  name: "text_to_video"
  first_frame_conditioning_p: 0.5   # 50% I2V: same as EXP-3-highcap
  with_audio: true
  audio_latents_dir: "audio_latents"

optimization:
  learning_rate: 1e-4
  steps: 10000
  batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  optimizer_type: "adamw"
  scheduler_type: "linear"
  scheduler_params: {}
  enable_gradient_checkpointing: true

acceleration:
  mixed_precision_mode: "bf16"
  quantization: null
  load_text_encoder_in_8bit: true

data:
  preprocessed_data_root: "/home/efrat_t_smiti_ai/data/golden_chase_preprocessed"
  num_dataloader_workers: 2

validation:
  prompts:
    - "CHASE_PP, the German Shepherd pup from PAW Patrol, stands at attention in his blue police uniform and hat. He salutes sharply and says 'CHASE_PP is on the case!' His brown eyes are focused and alert, tail wagging with determination. The audio captures his confident, clear voice."
    - "CHASE_PP from PAW Patrol sits in his blue police cruiser, scanning the road ahead with alert eyes. He speaks into his badge communicator: 'Ryder, I'm on my way!' His ears are perked up and his expression is serious but eager. The audio has his voice and the sound of the engine."
    - "CHASE_PP stands at the Lookout beside SKYE_PP, his tail wagging as he looks up at Ryder. He says 'No job too big, no pup too small!' His blue uniform gleams, and his expression is proud and confident. The audio captures his enthusiastic bark and clear voice."
  images: null   # TO BE FILLED IN: provide CHASE_PP reference image paths before training
  negative_prompt: "worst quality, inconsistent motion, blurry, jittery, distorted"
  video_dims: [960, 832, 49]   # 2s validation clips at 24fps (49 frames)
  frame_rate: 24.0
  seed: 42
  inference_steps: 30
  interval: 500
  videos_per_prompt: 1
  guidance_scale: 4.0
  stg_scale: 1.0
  stg_blocks: [29]
  stg_mode: "stg_av"
  generate_audio: true
  skip_initial_validation: false

checkpoints:
  interval: 500
  keep_last_n: 0  # Keep all — needed to benchmark full training curve
  precision: "bfloat16"

flow_matching:
  timestep_sampling_mode: "shifted_logit_normal"
  timestep_sampling_params: {}

hub:
  push_to_hub: false
  hub_model_id: null

wandb:
  enabled: true
  project: "ltx-2-chase-lora"
  entity: null
  tags: ["ltx2", "lora", "chase", "exp1-highcap", "960x832", "rank32"]
  log_validation_videos: true

seed: 42
output_dir: "outputs/chase_exp1_highcap"
