# =============================================================================
# Skye LoRA — EXP-3: High Capacity (rank 32 + FFN / 3000 steps)
# =============================================================================
#
# Purpose: Add feed-forward layers to capture more of Skye's distinctive motion
# style (helicopter spin, paw gestures, facial expressions).
#
# When to run: ONLY if EXP-2 shows underfitting — character looks generic,
# movements don't match Skye's style, or expressions are wrong.
# Do NOT run in parallel with EXP-2; evaluate EXP-2 first.
#
# Key difference from EXP-2: target_modules includes ff.net.0.proj, ff.net.2,
# audio_ff.net.0.proj, audio_ff.net.2 (feed-forward layers in all 48 blocks).
# =============================================================================

model:
  model_path: "/home/efrat_t_smiti_ai/models/LTX-2.3/ltx-2.3-22b-dev.safetensors"
  text_encoder_path: "/home/efrat_t_smiti_ai/models/gemma-3-12b-it-qat-q4_0-unquantized"
  training_mode: "lora"
  load_checkpoint: "outputs/skye_exp3_highcap/checkpoints/lora_weights_step_03000.safetensors"

lora:
  rank: 32
  alpha: 32
  dropout: 0.0
  target_modules:
    # Attention layers (video + audio + cross-modal)
    - "to_k"
    - "to_q"
    - "to_v"
    - "to_out.0"
    # Feed-forward layers — adds motion/style capacity
    - "ff.net.0.proj"
    - "ff.net.2"
    - "audio_ff.net.0.proj"
    - "audio_ff.net.2"

training_strategy:
  name: "text_to_video"
  first_frame_conditioning_p: 0.5
  with_audio: true
  audio_latents_dir: "audio_latents"

optimization:
  learning_rate: 1e-4
  steps: 15000
  batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  optimizer_type: "adamw"
  scheduler_type: "linear"
  scheduler_params: {}
  enable_gradient_checkpointing: true

acceleration:
  mixed_precision_mode: "bf16"
  quantization: null
  load_text_encoder_in_8bit: true

data:
  preprocessed_data_root: "/home/efrat_t_smiti_ai/data/golden_skye_preprocessed"
  num_dataloader_workers: 2

validation:
  prompts:
    - "SKYE, the Cockapoo pup from PAW Patrol, sits in her pink helicopter cockpit with her aviator helmet on. She says 'PAW Patrol, on a roll!' Her big purple eyes light up with excitement as she pulls back on the controls. The audio captures her enthusiastic voice and the hum of the helicopter blades."
    - "SKYE from PAW Patrol does an aerial barrel roll with her helicopter backpack, pink fur gleaming in the sunlight, ears streaming behind her as she spins. She calls out 'This pup's gotta fly!' The audio has her joyful laugh and the whirring of her rotors."
    - "SKYE sits at the Lookout tower beside Chase, her tail wagging eagerly. She tilts her head and says 'Don't worry, I've got this!' Her purple eyes are wide and bright, full of confidence. The audio captures her clear, cheerful voice and ambient outdoor sounds."
  negative_prompt: "worst quality, inconsistent motion, blurry, jittery, distorted"
  images: null
  video_dims: [960, 544, 49]
  frame_rate: 25.0
  seed: 42
  inference_steps: 30
  interval: 250
  videos_per_prompt: 1
  guidance_scale: 4.0
  stg_scale: 1.0
  stg_blocks: [29]
  stg_mode: "stg_av"
  generate_audio: true
  skip_initial_validation: false

checkpoints:
  interval: 250
  keep_last_n: 0  # 0 = keep all checkpoints — needed to benchmark full training curve
  precision: "bfloat16"

flow_matching:
  timestep_sampling_mode: "shifted_logit_normal"
  timestep_sampling_params: {}

hub:
  push_to_hub: false
  hub_model_id: null

wandb:
  enabled: true
  project: "ltx-2-skye-lora"
  entity: null
  tags: ["ltx2", "lora", "skye", "exp3-highcap"]
  log_validation_videos: true

seed: 42
output_dir: "outputs/skye_exp3_highcap"