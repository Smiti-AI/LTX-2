# =============================================================================
# skye_golden_v2_motion_voice_v1_continue — resume LoRA B (with audio) from step 2000
# =============================================================================
# Base run was 2 000 steps on 4× H100 DDP (effective batch=4). Visual ID partially
# locked but val/loss + clean-bucket train loss still trending down → step
# count, not capacity, is the constraint. Continue +8 000 more steps to step
# 10 000 on a single H100 at constant LR 3e-5 (same recipe as
# goldenPLUS_mixed_cast_v1_continue.yaml).
#
# Validation samples re-enabled but lighter:
#   - 1 prompt / 1 seed (down from 4)
#   - inference_steps: 10 (down from 30)
#   - interval: 1000 (down from 250)
# This dodges the OOM that killed the prior single-GPU runs at validation time.
# =============================================================================

model:
  model_path: "/home/efrat_t_smiti_ai/models/LTX-2.3/ltx-2.3-22b-dev.safetensors"
  text_encoder_path: "/home/efrat_t_smiti_ai/models/gemma-3-12b-it-qat-q4_0-unquantized"
  training_mode: "lora"
  load_checkpoint: "/home/efrat_t_smiti_ai/lora_files/lora_B_audio_step2000.safetensors"

lora:
  rank: 32
  alpha: 32
  dropout: 0.0
  target_modules:
    - "to_k"
    - "to_q"
    - "to_v"
    - "to_out.0"
    - "ff.net.0.proj"
    - "ff.net.2"
    - "audio_ff.net.0.proj"
    - "audio_ff.net.2"

training_strategy:
  name: "text_to_video"
  first_frame_conditioning_p: 0.5
  with_audio: true
  audio_latents_dir: "audio_latents"

optimization:
  learning_rate: 3e-5
  steps: 10000
  batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  optimizer_type: "adamw"
  scheduler_type: "constant"
  scheduler_params: {}
  enable_gradient_checkpointing: true

acceleration:
  mixed_precision_mode: "bf16"
  quantization: null
  load_text_encoder_in_8bit: true

data:
  preprocessed_data_root: "/home/efrat_t_smiti_ai/training_data_full/skye_golden_v2/precomputed"
  num_dataloader_workers: 2

validation:
  # Light validation — just enough to give a W&B media sample now and then
  prompts:
    - "SKYE_PP the cockapoo pup stands in front of the Adventure Bay Lookout under a clear blue sky. She turns toward the camera with a bright smile and says cheerfully, 'Happy birthday!' Her eyes sparkle. The audio captures her cheerful, high-pitched voice, gentle ocean waves, and a soft breeze."
  images:
    - "/home/efrat_t_smiti_ai/inference_seeds/skye_v1/bey.png"
  negative_prompt: "worst quality, inconsistent motion, blurry, jittery, distorted"
  video_dims: [960, 544, 49]
  frame_rate: 24.0
  seed: 42
  inference_steps: 10
  interval: 1000
  loss_holdout_count: 8
  loss_interval: 100
  loss_seed: 2025
  videos_per_prompt: 1
  guidance_scale: 4.0
  stg_scale: 1.0
  stg_blocks: [29]
  stg_mode: "stg_av"
  generate_audio: true
  skip_initial_validation: true

checkpoints:
  interval: 1000
  keep_last_n: 2
  precision: "bfloat16"

flow_matching:
  timestep_sampling_mode: "shifted_logit_normal"
  timestep_sampling_params: {}

hub:
  push_to_hub: false
  hub_model_id: null

wandb:
  enabled: true
  project: "LTX2_lora"
  entity: null
  tags: ["skye", "motion_voice", "videos", "audio", "rank32", "skye_golden_v2_motion_voice_v1", "continue"]
  log_validation_videos: true

seed: 42
output_dir: "outputs/skye_golden_v2_motion_voice_v1_continue"
