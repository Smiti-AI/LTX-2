# =============================================================================
# SKYE_PP LoRA — DRY RUN (10 clips / 100 steps)
# =============================================================================
# Purpose: Validate the full pipeline end-to-end before committing to full data.
# Uses the 10-clip dry run dataset in /home/efrattaig/data/skye_dryrun_preprocessed.
# Expected: training runs without errors; validation video at step 100 shows
# any animated content (character fidelity not expected with 10 clips).
# =============================================================================

model:
  model_path: "/home/efrattaig/models/LTX-2.3/ltx-2.3-22b-dev.safetensors"
  text_encoder_path: "/home/efrattaig/models/gemma-3-12b-it-qat-q4_0-unquantized"
  training_mode: "lora"
  load_checkpoint: null

lora:
  rank: 16
  alpha: 16
  dropout: 0.0
  target_modules:
    - "to_k"
    - "to_q"
    - "to_v"
    - "to_out.0"

training_strategy:
  name: "text_to_video"
  first_frame_conditioning_p: 0.5
  with_audio: true
  audio_latents_dir: "audio_latents"

optimization:
  learning_rate: 1e-4
  steps: 100
  batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  optimizer_type: "adamw"
  scheduler_type: "linear"
  scheduler_params: {}
  enable_gradient_checkpointing: true

acceleration:
  mixed_precision_mode: "bf16"
  quantization: null
  load_text_encoder_in_8bit: true

data:
  preprocessed_data_root: "/home/efrattaig/data/skye_dryrun_preprocessed"
  num_dataloader_workers: 2

validation:
  prompts:
    - "SKYE_PP, the Cockapoo pup from PAW Patrol, sits in her pink helicopter cockpit with her aviator helmet on. She says 'PAW Patrol, on a roll!' Her big purple eyes light up with excitement."
  negative_prompt: "worst quality, inconsistent motion, blurry, jittery, distorted"
  images:
    - "/home/efrattaig/data/start_frames/skye_helicopter_birthday_gili.png"
  video_dims: [960, 544, 49]
  frame_rate: 25.0
  seed: 42
  inference_steps: 30
  interval: 100
  videos_per_prompt: 1
  guidance_scale: 4.0
  stg_scale: 1.0
  stg_blocks: [29]
  stg_mode: "stg_av"
  generate_audio: true
  skip_initial_validation: false

checkpoints:
  interval: 100
  keep_last_n: 1
  precision: "bfloat16"

flow_matching:
  timestep_sampling_mode: "shifted_logit_normal"
  timestep_sampling_params: {}

hub:
  push_to_hub: false
  hub_model_id: null

wandb:
  enabled: true
  project: "ltx-2-skye-lora"
  entity: null
  tags: ["ltx2", "lora", "skye", "dryrun"]
  log_validation_videos: true

seed: 42
output_dir: "outputs/skye_dryrun"